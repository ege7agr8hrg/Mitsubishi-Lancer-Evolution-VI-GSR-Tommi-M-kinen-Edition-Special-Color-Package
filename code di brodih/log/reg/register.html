<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng ký</title>
  <link rel="stylesheet" href="register.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-compat.js"></script>
  <script src="../../config.js"></script>
</head>
<body>
  <div class="register-container">
    <h2>Đăng ký</h2>
    <form id="registerForm">
      <div class="input-group">
        <input type="email" id="email" placeholder="Email" required>
      </div>
      <div class="input-group">
        <input type="text" id="username" placeholder="Tên đăng nhập (không bắt buộc)">
      </div>
      <div class="input-group">
        <input type="password" id="password" placeholder="Mật khẩu" required>
      </div>
      <div class="input-group">
        <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
      </div>
      <button type="submit" class="register-btn">Đăng ký</button>
      <p class="login-link">Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
    </form>
  </div>
  <script src="register.js"></script>
</body>
</html>
