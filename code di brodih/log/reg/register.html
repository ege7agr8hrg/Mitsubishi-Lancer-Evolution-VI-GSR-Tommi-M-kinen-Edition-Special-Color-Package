<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký</title>
<link rel="stylesheet" href="register.css">
</head>

<body>
<div id="logo">
  <img src="./help.gif" alt="Logo" height="70" width="70">
</div>
<form>

<div class="register-container">
  <h2>Đăng ký</h2>

  <div class="input-group">
    <input type="email" id="email" placeholder="Email">
  </div>

  <div class="input-group">
    <input type="text" id="username" placeholder="Tên đăng nhập (không bắt buộc)">
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="Mật khẩu">
  </div>

  <div class="input-group">
    <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
  </div>

  <button class="register-btn">Đăng ký</button>

  <p class="login-link">
    Đã có tài khoản? <a href="login.html">Đăng nhập</a>
  </p>

</div>

</form>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-compat.js"></script>
<script src="../../config.js"></script>
<script src="auth.js"></script>
<script src="register.js"></script>

</body>
</html>
