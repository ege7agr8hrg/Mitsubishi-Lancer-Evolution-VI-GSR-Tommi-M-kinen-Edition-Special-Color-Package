<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Store</title>

<link rel="stylesheet" href="index.css">

</head>

<body>

<!-- NAVBAR -->

<div class="nav-wrapper">

    <div id="navcontent">
        <button>Tài khoản</button>
    </div>

    <div class="search-container">
        🔍
        <input type="text" placeholder="Search product...">
    </div>

</div>

<!-- HERO -->

<section class="hero">

<div class="slider">

<div class="slides">

<div class="slide">
<img src="images/hero1.jpg">
</div>

<div class="slide">
<img src="images/hero2.jpg">
</div>

<div class="slide">
<img src="images/hero3.jpg">
</div>

</div>

<button class="prev">&#10094;</button>
<button class="next">&#10095;</button>

<div class="dots"></div>

</div>

</section>

<!-- PRODUCT SECTION -->

<section class="products">

<h2>Sản phẩm</h2>

<div class="product-grid">

<div class="product-card">
<img src="images/pici1.jpg">
<h3>Gaming PC RTX</h3>
<p class="price">32.000.000đ</p>
<button class="buy">Mua ngay</button>
</div>

<div class="product-card">
<img src="images/pici1.jpg">
<h3>Gaming PC Ryzen</h3>
<p class="price">28.000.000đ</p>
<button class="buy">Mua ngay</button>
</div>

<div class="product-card">
<img src="images/pici1.jpg">
<h3>Gaming PC Intel</h3>
<p class="price">35.000.000đ</p>
<button class="buy">Mua ngay</button>
</div>

<div class="product-card">
<img src="images/pici1.jpg">
<h3>Streaming PC</h3>
<p class="price">40.000.000đ</p>
<button class="buy">Mua ngay</button>
</div>

</div>

</section>

<script src="index.js"></script>

</body>
</html>
