<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sản phẩm</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div id="nav">
        <img src="../fl c/help.gif" alt="" id="logo" width="70" height="70">
        <div id="navcontent">
            <button class="left" onclick="inputlogout()">Tài khoản</button>
            <button class="left" onclick="inputservice()">Dịch vụ</button>
            <button class="left" onclick="inputemployee()">Nhân viên</button>
            <button class="right" onclick="inputproducts()">Sản phẩm</button>
        </div>
    </div>

    <div id="manage-container">
        <div class="two-column">
            <div class="manage-section">
                <h2 id="formTitle">Thêm sản phẩm</h2>
                <form id="productForm">
                    <div class="form-group">
                        <label>Tên sản phẩm *</label><br><br>
                        <input id="productName" type="text" required>
                    </div><br>
                    <div class="form-group">
                        <label>Giá ($) *</label><br><br>
                        <input id="productPrice" type="number" step="1" min="0" required>
                    </div><br>
                    <div class="form-group">
                        <label>Category *</label><br><br>
                        <select id="productCategory" required>
                            <option value="">Chọn loại sản phẩm</option>
                            <option value="RAM">RAM</option>
                            <option value="SSD">SSD</option>
                            <option value="HDD">HDD</option>
                            <option value="Case">Vỏ</option>
                            <option value="Cooler">Làm mát</option>
                            <option value="PSU">PSU</option>
                            <option value="Motherboard">Bo mạch chủ</option>
                            <option value="GPU">GPU</option>
                            <option value="CPU">CPU</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Ảnh(URL)</label><br><br>
                        <input id="productImage" type="text" required>
                    </div><br>
                    <div class="form-group">
                        <label>Số lượng *</label><br><br>
                        <input id="productQuantity" type="number" min="0" required>
                    </div><br>
                    <div class="form-group">
                        <label>Tiêu đề</label><br><br>
                        <textarea id="productDescription"></textarea>
                    </div><br>
                    <div style="display:flex;gap:8px">
                        <button id="submitBtn" class="btn btn-primary">Thêm sản phẩm</button>
                        <button type="button" class="btn" onclick="resetForm()">Xóa</button>
                    </div>
                </form>
            </div>
        </div>
    </div> 

    <div id="manage-section">
        <h2>Danh sách sản phẩm</h2>
        <div id="Filter"></div>
        <div id="search">
            <input id="searchInput" type="text" placeholder="Search...">
        </div>
        <div id="products-list">
            <div class="empty-state">Chưa có sản phẩm nào</div>
        </div>
    </div>

    <script src="manage.js"></script>
</body>
</html>
